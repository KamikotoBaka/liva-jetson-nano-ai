version: '2.3'  # Diese Zeile ist für alte Docker-Versionen extrem wichtig!
services:
  # 1. Non-Thinking LLM (Qwen 3.5 0.8B)
  llm:
    # Wir nutzen ein fertiges Image von DustynV (NVIDIA Community Manager)
    # Er baut diese speziell für JetPack 4.6.1 / Nano
    image: dustynv/llama_cpp:r32.7.1 
    container_name: liva-llm
    runtime: nvidia
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    # Der Befehl muss an die Syntax des fertigen Images angepasst werden
    command: python3 -m llama_cpp.server --model /models/Qwen3.5-0.8B-Q5_K_M.gguf --n_gpu_layers 99 --host 0.0.0.0 --port 8080
    
  # 2. Whisper.cpp (Audio-zu-Text)
  whisper:
    # Dieses Image ist für JetPack 4.6.1 vorkompiliert
    image: dustynv/whisper_cpp:r32.7.1
    container_name: whisper-api
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ./models:/models
    ports:
      - "8081:8081"
    # Wir starten den fertigen Server im Image
    command: whisper-server --model /models/ggml-tiny.bin --port 8081 --host 0.0.0.0

  # 3. Main Application
  my-app:
    build: project/
    container_name: liva-app
    depends_on:
      - llm
      - whisper
    environment:
      - NON_THINKING_URL=http://llm:8080
      - WHISPER_URL=http://whisper:8081
    ports:
      - "5000:5000"
    networks:
      - proxy-nw
      - default

networks:
  proxy-nw:
    external: true